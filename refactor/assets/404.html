<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 • Build Break Repeat</title>

<style>
:root {
  --bg: #070b14;
  --text: #e5eefc;
  --muted: #93a4c3;
  --accent: #7c3aed;
  --accent-2: #22d3ee;
  --danger: #fb7185;

  /* dynamic mouse vars */
  --mouse-x: 50%;
  --mouse-y: 50%;
}

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  font-family: Inter, system-ui, sans-serif;
  background:#070b14;
  color:var(--text);
  overflow:hidden;
}

/* 🌌 Background Image */
.bg-image {
  position: fixed;
  inset: 0;
  background: url("/assets/anime-bg.png") center / cover no-repeat;
  filter: brightness(0.55) contrast(1.1);
  transform: scale(1.05);
  transition: transform 0.2s ease-out;
  z-index: 0;
}

/* 🧠 Parallax layers */
.parallax {
  position:fixed;
  inset:0;
  pointer-events:none;
}

/* 🔥 Neon glow (follows mouse) */
.glow {
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at var(--mouse-x) var(--mouse-y),
      rgba(124,58,237,0.25),
      transparent 40%),
    radial-gradient(circle at calc(var(--mouse-x) + 10%) calc(var(--mouse-y) + 10%),
      rgba(34,211,238,0.15),
      transparent 50%);
  z-index:-2;
}

/* Grid */
.grid {
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(148,163,184,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,0.04) 1px, transparent 1px);
  background-size:52px 52px;
  mask-image: radial-gradient(ellipse 80% 60% at center, black 20%, transparent 80%);
}

/* Layout */
.wrap {
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
}

/* Glass Card */
.card {
  width:min(860px,100%);
  padding:52px;
  border-radius:32px;
  background:rgba(15,23,42,0.55);
  backdrop-filter:blur(30px);
  border:1px solid rgba(148,163,184,0.15);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* Badge */
.badge {
  display:inline-flex;
  gap:8px;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(251,113,133,0.08);
  border:1px solid rgba(251,113,133,0.2);
  color:var(--danger);
  font-size:0.8rem;
}

.pulse {
  width:6px;
  height:6px;
  background:var(--danger);
  border-radius:50%;
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 0 0 rgba(251,113,133,0.5); }
  70% { box-shadow:0 0 0 8px rgba(251,113,133,0); }
}

/* Layout grid */
.layout {
  display:grid;
  grid-template-columns:1fr auto;
  gap:48px;
  margin-top:32px;
}

/* ⚡ GLITCH 404 */
.glitch {
  font-size:clamp(6rem, 15vw, 10rem);
  font-weight:900;
  position:relative;
  color:white;
}

.glitch::before,
.glitch::after {
  content:"404";
  position:absolute;
  left:0;
  top:0;
  width:100%;
  overflow:hidden;
}

.glitch::before {
  color:#7c3aed;
  z-index:-1;
  animation:glitchTop 2s infinite;
}

.glitch::after {
  color:#22d3ee;
  z-index:-2;
  animation:glitchBottom 2s infinite;
}

@keyframes glitchTop {
  0%,100% { transform:translate(0); }
  20% { transform:translate(-3px,-2px); }
  40% { transform:translate(-3px,2px); }
  60% { transform:translate(3px,-1px); }
}

@keyframes glitchBottom {
  0%,100% { transform:translate(0); }
  20% { transform:translate(3px,2px); }
  40% { transform:translate(3px,-2px); }
  60% { transform:translate(-3px,1px); }
}

/* Text */
h1 {
  font-size:2rem;
  margin:20px 0;
  background:linear-gradient(135deg,#fff,#c4b5fd,#67e8f9);
  -webkit-background-clip:text;
  color:transparent;
}

.sub {
  color:var(--muted);
  line-height:1.6;
}

/* Buttons */
.actions {
  margin-top:30px;
  display:flex;
  gap:12px;
}

.btn {
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
}

.btn-primary {
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  color:white;
}

.btn-ghost {
  border:1px solid rgba(148,163,184,0.2);
  color:var(--muted);
}

/* Responsive */
@media(max-width:700px){
  .layout { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="bg-image"></div>

<div class="parallax">
  <div class="glow"></div>
</div>

<div class="grid"></div>

<main class="wrap">
<section class="card">

<div class="badge">
  <span class="pulse"></span>
  404 — route not found
</div>

<div class="layout">

<div>
  <h1>This route broke.<br>Time to build again.</h1>
  <p class="sub">
    The path you requested doesn't exist.
    Every failure is just iteration.
  </p>

  <div class="actions">
    <a class="btn btn-primary" href="/">Go home</a>
    <a class="btn btn-ghost" href="javascript:history.back()">Go back</a>
  </div>
</div>

<div class="glitch">404</div>

</div>
</section>
</main>

<script>
/* 🎯 Mouse tracking */
document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth) * 100;
  const y = (e.clientY / window.innerHeight) * 100;

  document.documentElement.style.setProperty("--mouse-x", x + "%");
  document.documentElement.style.setProperty("--mouse-y", y + "%");

  /* Parallax effect */
  const bg = document.querySelector(".bg-image");
  bg.style.transform = `scale(1.05) translate(${x * -0.02}px, ${y * -0.02}px)`;
});
</script>

</body>
</html>
